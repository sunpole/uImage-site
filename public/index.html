<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Короткие новости и история обновлений uImage.">
  <meta name="theme-color" content="#101114">
  <title>uImage — обновления</title>
  <link rel="stylesheet" href="./styles.css">
  <script type="module" src="./app.mjs"></script>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="./" aria-label="uImage">
      <span class="brand-mark" aria-hidden="true">u</span>
      <span>uImage</span>
    </a>
    <nav class="language" aria-label="Language / Язык">
      <button type="button" data-language="ru">Русский</button>
      <button type="button" data-language="en">English</button>
    </nav>
  </header>

  <main>
    <section class="hero">
      <p class="eyebrow" data-text="eyebrow">В разработке</p>
      <h1 data-text="title">Картины по номерам — проще и удобнее.</h1>
      <p class="lede" data-text="lede">Здесь коротко рассказываем, что уже работает и что появится дальше.</p>
      <a class="primary" href="#updates" data-text="read">Смотреть обновления</a>
    </section>

    <section class="updates" id="updates">
      <div class="section-heading">
        <p class="eyebrow" data-text="updatesEyebrow">История разработки</p>
        <h2 data-text="updatesTitle">Что нового</h2>
      </div>
      <div class="release-list" id="release-list" aria-live="polite"></div>
    </section>
  </main>

  <footer>
    <span>© 2026 uImage</span>
    <span data-text="footer">Показываем прогресс без лишних технических подробностей.</span>
  </footer>

  <template id="release-template">
    <article class="release-card">
      <div class="release-meta"><span class="version"></span><time></time></div>
      <h3></h3>
      <p class="summary"></p>
      <h4 class="changes-title"></h4>
      <ul class="changes"></ul>
      <div class="gallery" hidden></div>
      <p class="next"><strong></strong> <span></span></p>
    </article>
  </template>
</body>
</html>
